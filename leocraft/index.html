<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>LeoCraft</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%; width: 100%;
      overflow: hidden; background: #8fd0ff;
      font-family: "Lexend", "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
      -webkit-user-select: none; user-select: none;
    }
    /* Cruceta central */
    #crosshair {
      position: fixed; left: 50%; top: 50%;
      width: 26px; height: 26px; margin: -13px 0 0 -13px;
      pointer-events: none; z-index: 20; opacity: 0.85;
    }
    #crosshair::before, #crosshair::after {
      content: ""; position: absolute; background: #fff; box-shadow: 0 0 2px rgba(0,0,0,.7);
    }
    #crosshair::before { left: 11px; top: 0; width: 4px; height: 26px; }
    #crosshair::after  { top: 11px; left: 0; height: 4px; width: 26px; }

    /* Título */
    #title {
      position: fixed; top: 14px; left: 14px; z-index: 20;
      background: rgba(46,58,35,.78); color: #fff; font-weight: 700; font-size: 22px;
      padding: 8px 16px; border-radius: 12px; border: 3px solid #6abf47; pointer-events: none;
    }
    #title span { color: #ffe27a; }

    /* Ayuda de controles (arriba centro, compacta) */
    #controls {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%); z-index: 20;
      display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
      background: rgba(46,58,35,.72); color: #fff; padding: 7px 16px; border-radius: 12px;
      border: 3px solid #6abf47; font-size: 15px; font-weight: 500; pointer-events: none; max-width: 70vw;
    }
    #controls b { color: #ffe27a; }

    /* Hotbar (abajo centro, estilo Minecraft) */
    #hotbar {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); z-index: 20;
      display: flex; gap: 8px; padding: 8px; pointer-events: none;
      background: rgba(46,58,35,.78); border: 3px solid #6abf47; border-radius: 14px;
    }
    .slot {
      width: 54px; height: 54px; border-radius: 8px; border: 3px solid rgba(255,255,255,.22);
      background-size: 100% 100%; image-rendering: pixelated; position: relative;
    }
    .slot.sel {
      border-color: #ffe27a; box-shadow: 0 0 0 2px #ffe27a, 0 0 14px #ffe27a; transform: scale(1.07);
    }
    .slot .num {
      position: absolute; top: -3px; left: 3px; font-size: 13px; font-weight: 700;
      color: #fff; text-shadow: 0 1px 2px #000;
    }
    .slot .nm {
      position: absolute; bottom: -19px; left: 50%; transform: translateX(-50%);
      font-size: 12px; color: #fff; white-space: nowrap; opacity: 0; transition: opacity .15s;
    }
    .slot.sel .nm { opacity: 1; color: #ffe27a; font-weight: 700; }

    /* Pantalla de bienvenida */
    #start {
      position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 26px; text-align: center;
      background: radial-gradient(circle at 50% 35%, #9fd8ff 0%, #6fb3e8 60%, #4f8fcf 100%); cursor: pointer;
    }
    #start h1 {
      margin: 0; font-size: clamp(44px, 9vw, 96px); font-weight: 700; color: #fff;
      text-shadow: 0 4px 0 #2e7d1c, 0 7px 14px rgba(0,0,0,.3); letter-spacing: 1px;
    }
    #start h1 b { color: #ffe27a; }
    #start p { margin: 0; font-size: clamp(20px, 3.4vw, 30px); font-weight: 500; color: #20351a; max-width: 20ch; line-height: 1.4; }
    #start .play {
      font-size: clamp(24px, 4vw, 34px); font-weight: 700; color: #fff; background: #46a52a;
      border: 5px solid #2e7d1c; border-radius: 18px; padding: 16px 40px;
      box-shadow: 0 6px 0 #2e7d1c, 0 10px 18px rgba(0,0,0,.25); animation: bob 1.4s ease-in-out infinite;
    }
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

    /* ---------- Carteles de Sabiduría ---------- */
    #cartel-overlay {
      position: fixed; inset: 0; z-index: 60; display: flex; align-items: center; justify-content: center;
      background: rgba(10,20,30,.55);
    }
    #cartel-card {
      background: #fffdf5; border: 6px solid #6abf47; border-radius: 22px; padding: 28px 30px 26px;
      max-width: 580px; width: 88vw; text-align: center; box-shadow: 0 16px 44px rgba(0,0,0,.38);
    }
    #cartel-emoji { font-size: 46px; margin-bottom: 4px; }
    #cartel-speaker { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 8px; }
    #cartel-portrait { width: 60px; height: 60px; image-rendering: pixelated; border: 3px solid #6abf47; border-radius: 12px; background: #eaf7e3; }
    #cartel-speaker-name { font-size: 23px; font-weight: 700; color: #2e7d1c; }
    #cartel-banner-portrait { width: 40px; height: 40px; image-rendering: pixelated; border: 3px solid #6abf47; border-radius: 9px; background: #eaf7e3; }
    #nameplate {
      position: fixed; top: 132px; left: 50%; transform: translateX(-50%); z-index: 22;
      background: rgba(46,58,35,.82); color: #fff; border: 3px solid #6abf47; border-radius: 12px;
      padding: 6px 16px; font-size: 18px; font-weight: 700; pointer-events: none;
    }
    #nameplate span { color: #ffe27a; }
    #monument-counter {
      position: fixed; top: 14px; right: 14px; z-index: 22;
      background: rgba(46,58,35,.82); color: #fff; border: 3px solid #6abf47; border-radius: 12px;
      padding: 8px 16px; font-size: 19px; font-weight: 700; pointer-events: none;
    }
    #monument-counter span { color: #ffe27a; }
    .leo-toast {
      position: fixed; bottom: 150px; left: 50%; transform: translateX(-50%); z-index: 56;
      background: #fffdf5; color: #23331a; border: 4px solid #ffe27a; border-radius: 16px;
      padding: 12px 22px; font-size: clamp(16px,2.4vw,20px); font-weight: 700; pointer-events: none;
      box-shadow: 0 8px 22px rgba(0,0,0,.3); animation: pop .4s ease-out; max-width: 86vw; text-align: center;
    }
    #reset-link {
      font-size: clamp(14px,2vw,17px); font-weight: 600; color: #20351a; opacity: .7;
      text-decoration: underline; cursor: pointer; margin-top: 4px;
    }
    #reset-link:hover { opacity: 1; }
    /* fundido a negro entre mundos */
    #fade {
      position: fixed; inset: 0; z-index: 80; background: #000; opacity: 0;
      transition: opacity .45s ease; pointer-events: none;
    }
    /* corazones al curar al lobo */
    .heart-pop {
      position: fixed; z-index: 66; font-size: 30px; pointer-events: none;
      animation: heartUp 1.6s ease-out forwards;
    }
    @keyframes heartUp { 0% { transform: translateY(0) scale(.6); opacity: 0; } 20% { opacity: 1; } 100% { transform: translateY(-160px) scale(1.2); opacity: 0; } }
    /* indicador de mascota */
    #pet-badge {
      position: fixed; top: 60px; right: 14px; z-index: 22; background: rgba(46,58,35,.82);
      color: #fff; border: 3px solid #6abf47; border-radius: 12px; padding: 7px 14px;
      font-size: 16px; font-weight: 700; pointer-events: none;
    }
    #pet-badge span { color: #ffe27a; }
    /* aviso de mando conectado */
    #gamepad-badge {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(.9);
      z-index: 75; background: rgba(46,58,35,.92); color: #fff; border: 4px solid #6abf47;
      border-radius: 16px; padding: 16px 26px; font-size: clamp(18px,2.6vw,24px); font-weight: 700;
      text-align: center; max-width: 80vw; pointer-events: none; opacity: 0; transition: opacity .3s, transform .3s;
    }
    #gamepad-badge.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    /* opción del cartel enfocada con el mando */
    .cartel-opt.gp-focus {
      outline: 5px solid #ffe27a; outline-offset: 3px;
      box-shadow: 0 5px 0 #2e7d1c, 0 0 18px #ffe27a; transform: translateY(-2px) scale(1.04);
    }
    #cartel-text { font-size: clamp(24px,3.6vw,32px); font-weight: 700; color: #23331a; line-height: 1.45; margin: 6px 0 18px; }
    #cartel-speak {
      font-family: inherit; font-size: 20px; font-weight: 700; color: #2e7d1c; background: #eaf7e3;
      border: 3px solid #6abf47; border-radius: 14px; padding: 10px 22px; cursor: pointer; margin-bottom: 18px;
    }
    #cartel-speak:hover { background: #dcf0d0; }
    #cartel-options { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .cartel-opt {
      font-family: inherit; font-size: clamp(18px,2.6vw,24px); font-weight: 700; color: #fff; background: #46a52a;
      border: 4px solid #2e7d1c; border-radius: 16px; padding: 16px 26px; cursor: pointer; min-width: 170px;
      box-shadow: 0 5px 0 #2e7d1c; transition: transform .1s;
    }
    .cartel-opt:hover { transform: translateY(-2px); }
    .cartel-opt:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7d1c; }
    #cartel-hint { font-size: 19px; font-weight: 600; color: #c0573a; min-height: 24px; margin-top: 14px; }

    #cartel-banner {
      position: fixed; top: 86px; left: 50%; transform: translateX(-50%); z-index: 55; background: #fffdf5;
      border: 5px solid #6abf47; border-radius: 18px; padding: 14px 24px; max-width: 82vw; text-align: center;
      box-shadow: 0 10px 28px rgba(0,0,0,.32);
    }
    .banner-row { display: flex; align-items: center; gap: 12px; justify-content: center; }
    #cartel-banner-emoji { font-size: 30px; }
    #cartel-banner-text { font-size: clamp(20px,2.8vw,26px); font-weight: 700; color: #23331a; }
    #cartel-banner-hint { font-size: 16px; font-weight: 600; color: #c0573a; margin-top: 6px; min-height: 20px; opacity: 0; transition: opacity .2s; }

    #cartel-bravo {
      position: fixed; top: 30%; left: 50%; transform: translate(-50%,-50%); z-index: 70;
      font-size: clamp(34px,6vw,58px); font-weight: 700; color: #fff;
      text-shadow: 0 4px 0 #2e7d1c, 0 8px 18px rgba(0,0,0,.35); pointer-events: none; animation: pop .4s ease-out;
    }
    @keyframes pop {
      0% { transform: translate(-50%,-50%) scale(.4); opacity: 0; }
      60% { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(1); }
    }

    #confetti { position: fixed; inset: 0; z-index: 65; pointer-events: none; overflow: hidden; }
    .confetti-piece { position: absolute; top: -16px; width: 11px; height: 14px; border-radius: 2px; animation: fall 1.5s linear forwards; }
    @keyframes fall { to { transform: translateY(108vh) rotate(var(--rot)); opacity: .25; } }

    #resume-hint {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 55;
      background: rgba(46,58,35,.85); color: #fff; border: 3px solid #6abf47; border-radius: 12px;
      padding: 9px 18px; font-size: 17px; font-weight: 600; pointer-events: none;
    }
    /* ---------- Celebración final (Fase 9) ---------- */
    #fireworks { position: fixed; inset: 0; z-index: 78; pointer-events: none; overflow: hidden; }
    .fw-p { position: fixed; width: 8px; height: 8px; border-radius: 50%; animation: fwexp 1.1s ease-out forwards; }
    @keyframes fwexp { 0% { transform: translate(0,0) scale(1.2); opacity: 1; } 100% { transform: translate(var(--dx), var(--dy)) scale(.3); opacity: 0; } }
    #finale { position: fixed; inset: 0; z-index: 90; display: flex; align-items: center; justify-content: center; background: rgba(10,20,30,.5); }
    #finale-card {
      background: #fffdf5; border: 8px solid #ffe27a; border-radius: 26px; padding: 28px 34px; text-align: center;
      max-width: 560px; width: 90vw; box-shadow: 0 18px 50px rgba(0,0,0,.4); animation: pop .5s ease-out;
    }
    .fc-emoji { font-size: 70px; }
    #finale-card h2 { margin: 4px 0 10px; font-size: clamp(34px,6vw,52px); color: #2e7d1c; }
    #finale-card p { margin: 0 0 22px; font-size: clamp(20px,3.2vw,28px); font-weight: 600; color: #23331a; line-height: 1.5; }
    #finale-btn {
      font-family: inherit; font-size: clamp(22px,4vw,30px); font-weight: 700; color: #fff; background: #46a52a;
      border: 5px solid #2e7d1c; border-radius: 18px; padding: 16px 36px; cursor: pointer; box-shadow: 0 6px 0 #2e7d1c;
    }
    #finale-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #2e7d1c; }
    .hidden { display: none !important; }
  </style>
  <script type="module" crossorigin src="./assets/index-D6KV-802.js"></script>
</head>
<body>
  <div id="title">Leo<span>Craft</span></div>
  <div id="crosshair" class="hidden"></div>

  <div id="controls" class="hidden">
    <div>🕹️ <b>WASD</b>/flechas</div>
    <div>🖱️ mirar</div>
    <div>⛏️ <b>clic</b> romper</div>
    <div>🧱 <b>E</b> poner</div>
    <div>⬆️ <b>espacio</b></div>
    <div>🔢 <b>1–8</b> bloque</div>
  </div>

  <div id="hotbar" class="hidden"></div>

  <div id="start">
    <h1>Leo<b>Craft</b></h1>
    <p>¡Hola, Leo! Explora y construye tu mundo.</p>
    <div class="play">▶ Jugar</div>
    <p style="font-size:clamp(15px,2.2vw,18px);opacity:.8">Haz clic — o pulsa ✖️ en el mando — para empezar</p>
    <div id="reset-link" class="hidden">↺ empezar de nuevo</div>
  </div>

</body>
</html>
